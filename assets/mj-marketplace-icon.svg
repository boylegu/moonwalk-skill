<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Moonwalk AI marketplace icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111014"/>
      <stop offset="100%" stop-color="#1b1822"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4c7"/>
      <stop offset="45%" stop-color="#f4cd6a"/>
      <stop offset="100%" stop-color="#b67b18"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect x="42" y="42" width="428" height="428" rx="98" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="4"/>

  <path
    d="M140 234c0-74 52-124 116-124s116 50 116 124"
    fill="none"
    stroke="#faf7f0"
    stroke-width="18"
    stroke-linecap="round"
  />

  <g fill="url(#gold)">
    <rect x="124" y="225" width="48" height="112" rx="24"/>
    <rect x="340" y="225" width="48" height="112" rx="24"/>
  </g>

  <g fill="#f7f3eb" opacity="0.96">
    <rect x="172" y="232" width="16" height="98" rx="8"/>
    <rect x="324" y="232" width="16" height="98" rx="8"/>
  </g>

  <g filter="url(#glow)" fill="url(#gold)">
    <path d="M236 224l34 24-34 24-10-12 18-12-18-12z"/>
    <rect x="286" y="241" width="42" height="14" rx="7"/>
  </g>
</svg>
